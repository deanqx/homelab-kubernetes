apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gateway-api-upstream
  namespace: flux-system
spec:
  interval: 24h
  url: https://github.com/kubernetes-sigs/gateway-api
  ref:
    tag: v1.5.1
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  # Custom Resource Definitions
  name: infra-crds
  namespace: flux-system
spec:
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: gateway-api-upstream
  # path inside Git repository:
  path: ./config/crd/experimental
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-crds
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  prune: false
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/production
