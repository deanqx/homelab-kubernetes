apiVersion: v1
kind: Namespace
metadata:
  name: cilium-gateway-system
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cilium
  namespace: cilium-gateway-system
  annotations:
    cert-manager.io/cluster-issuer: tls-issuer
spec:
  # Reference: https://cert-manager.io/docs/configuration/acme/http01/
  gatewayClassName: cilium
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    hostname: "*.kowi.it"
    allowedRoutes:
      namespaces:
        from: All
  - name: https
    protocol: HTTPS
    port: 443
    hostname: cloud.kowi.it
    tls:
      mode: Terminate
      certificateRefs:
      - kind: Secret
        name: cloud-kowi-it
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-to-https-redirect
  namespace: cilium-gateway-system
spec:
  # Reference: https://gateway-api.sigs.k8s.io/guides/user-guides/http-redirect-rewrite/
  parentRefs:
  - name: cilium
    sectionName: http
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
