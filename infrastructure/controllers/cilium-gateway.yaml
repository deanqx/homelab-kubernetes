apiVersion: v1
kind: Namespace
metadata:
  name: cilium-gateway-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cilium
  namespace: cilium-gateway-system
spec:
  interval: 24h
  url: oci://quay.io/cilium/charts/cilium
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    semver: "1.19.4"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium-gateway
  namespace: cilium-gateway-system
spec:
  interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      # Automatically rollback on failure
      remediateLastFailure: true
  chartRef:
    kind: OCIRepository
    name: cilium
    namespace: flux-system
  values:
    gatewayAPI:
      enabled: true
