apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 24h
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      # Automatically rollback on failure
      remediateLastFailure: true
  chart:
    spec:
      version: "${longhorn_version}"
      chart: longhorn
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
  values:
    # Reference: https://longhorn.io/docs/1.11.2/references/helm-values/
    persistence:
      defaultClassReplicaCount: 1
    defaultSettings:
      # forbid scheduling to nodes with healthy replicas of the same volume
      replicaSoftAntiAffinity: false
      replicaDiskSoftAntiAffinity: false
      replicaZoneSoftAntiAffinity: false
      # allow if secondary node is offline, the primary can still function degraded
      allowVolumeCreationWithDegradedAvailability: true
