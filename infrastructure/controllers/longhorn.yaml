apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 24h
  url: https://charts.longhorn.io
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 12h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      version: "${longhorn_version}"
      chart: longhorn
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
  # ref: https://github.com/longhorn/longhorn/blob/master/chart/values.yaml
  values:
    persistence:
      defaultClassReplicaCount: 1
    defaultSettings:
      # forbid scheduling to nodes with healthy replicas of the same volume
      replicaSoftAntiAffinity: false
      replicaDiskSoftAntiAffinity: false
      replicaZoneSoftAntiAffinity: false
      # allow if secondary node is offline, the primary can still function degraded
      allowVolumeCreationWithDegradedAvailability: true
    metrics:
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: prometheus-stack
    resources:
      requests:
        cpu: 500m
        memory: 1536Mi
      limits:
        memory: 1536Mi
