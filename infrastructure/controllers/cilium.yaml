apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 24h
  url: oci://quay.io/cilium/charts/cilium
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    semver: "1.19.4"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 12h
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      # Automatically rollback on failure
      remediateLastFailure: true
  chartRef:
    kind: OCIRepository
    name: cilium
    namespace: kube-system
  values:
    bpf:
      masquerade: true
    cluster:
      name: default
    gatewayAPI:
      enabled: true
    hostFirewall:
      enabled: true
    ipam:
      operator:
        clusterPoolIPv4PodCIDRList:
        - 10.42.0.0/16
    k8sClientRateLimit:
      burst: 40
      qps: 20
    k8sServiceHost: dean-homelab
    k8sServicePort: 6443
    kubeProxyReplacement: true
    l2announcements:
      enabled: true
    operator:
      replicas: 1
    routingMode: tunnel
    tunnelProtocol: vxlan
