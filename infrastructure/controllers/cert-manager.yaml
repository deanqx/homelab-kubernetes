apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: cert-manager
  namespace: gateway-system
spec:
  interval: 24h
  url: oci://quay.io/jetstack/charts/cert-manager
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    semver: "${cert_manager_version}"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: gateway-system
spec:
  interval: 12h
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      # Automatically rollback on failure
      remediateLastFailure: true
  chartRef:
    kind: OCIRepository
    name: cert-manager
    namespace: gateway-system
  values:
    crds:
      enabled: true
      keep: true
    config:
      enableGatewayAPI: true
