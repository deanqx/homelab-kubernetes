apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-2node
provisioner: driver.longhorn.io
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: Immediate
parameters:
  # Reference: https://longhorn.io/docs/1.11.2/high-availability/data-locality/
  numberOfReplicas: "1"
  staleReplicaTimeout: "2880" # 48 hours in minutes
  fromBackup: ""
  # Best effort means it will run locally on whichever node the Postgres pod lands on
  dataLocality: "best-effort"
