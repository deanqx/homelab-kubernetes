apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: tls-issuer-production
spec:
  acme:
    # server: https://acme-v02.api.letsencrypt.org/directory
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: dean@kowatsch.de
    privateKeySecretRef:
      name: tls-account-key-production
    solvers:
    - http01:
        gatewayHTTPRoute:
          parentRefs:
            - name: cilium-gateway
              namespace: cilium-gateway-system
              kind: Gateway
