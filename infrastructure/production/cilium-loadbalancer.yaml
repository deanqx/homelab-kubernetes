apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: cilium-ip-pool
  namespace: kube-system
spec:
  blocks:
    - cidr: 10.101.2.200/29
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: cilium-l2-policy
  namespace: kube-system
spec:
  nodeSelector:
    matchLabels: {}
  serviceSelector:
    matchLabels: {}
  externalIPs: true
  loadBalancerIPs: true
  interfaces:
    - ^enp1s0$
