apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 24h
  url: oci://ghcr.io/grafana-community/helm-charts/loki
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    semver: "${loki_version}"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  dependsOn:
    - name: prometheus-stack
  interval: 12h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      # Automatically rollback on failure
      remediateLastFailure: true
  chartRef:
    kind: OCIRepository
    name: loki
    namespace: monitoring
  # ref: https://github.com/grafana-community/helm-charts/blob/main/charts/loki/values.yaml
  # template: https://github.com/fluxcd/flux2-monitoring-example/blob/main/monitoring/controllers/loki-stack/release.yaml
  values:
    deploymentMode: Monolithic
    loki:
      # single tenant: allow cluster wide access
      auth_enabled: false
      serviceMonitor:
        enabled: true
        labels:
          app.kubernetes.io/part-of: kube-prometheus-stack
      # template: https://grafana.com/docs/loki/latest/setup/install/helm/install-monolithic/
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      # ref: https://grafana.com/docs/loki/latest/operations/storage/schema/
      schemaConfig:
        configs:
          - from: "2026-06-07"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      pattern_ingester:
        enabled: true
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
      ruler:
        enable_api: true
    singleBinary:
      replicas: 1
      persistence:
        size: 10Gi
        storageClass: "longhorn-2node"
    extraObjects:
      - apiVersion: v1
        kind: ConfigMap
        metadata:
          name: loki-datasource
          labels:
            app: loki
            chart: loki
            release: loki
            grafana_datasource: "1"
            app.kubernetes.io/part-of: kube-prometheus-stack
        data:
          # ref: https://grafana.com/docs/grafana/latest/administration/provisioning/#datasources
          # ref: https://grafana.com/docs/grafana/latest/datasources/loki/configure-loki-data-source/
          loki-datasource.yaml: |-
            datasources:
            - name: Loki
              type: loki
              access: proxy
              url: http://loki:{{ .Values.loki.server.http_listen_port }}
              editable: false
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    # faster updates
    test:
      enabled: false
    lokiCanary:
      enabled: false
    # only used if loki.deploymentMode=SimpleScalable
    # ref: https://grafana.com/docs/loki/latest/setup/install/helm/install-monolithic/
    backend:
      replicas: 0
    write:
      replicas: 0
    read:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomPlanner:
      replicas: 0
    bloomBuilder:
      replicas: 0
    bloomGateway:
      replicas: 0
