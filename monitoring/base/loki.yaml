apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 24h
  url: oci://ghcr.io/grafana-community/helm-charts/loki
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
  ref:
    semver: "${loki_version}"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
spec:
  interval: 12h
  install:
    crds: Create
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
      # Automatically rollback on failure
      remediateLastFailure: true
  chartRef:
    kind: OCIRepository
    name: loki
    namespace: monitoring
  # ref: https://github.com/grafana-community/helm-charts/blob/main/charts/loki/values.yaml
  values:
    deploymentMode: Monolithic
    loki:
      # single tenant: allow cluster wide access
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      # ref: https://grafana.com/docs/loki/latest/operations/storage/schema/
      schemaConfig:
        configs:
          - from: "2026-06-05"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
    singleBinary:
      replicas: 1
      persistence:
        size: 10Gi
        storageClass: "longhorn-2node"
    # only used if loki.deploymentMode=SimpleScalable
    # ref: https://grafana.com/docs/loki/latest/setup/install/helm/install-monolithic/
    backend:
      replicas: 0
    write:
      replicas: 0
    read:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomPlanner:
      replicas: 0
    bloomBuilder:
      replicas: 0
    bloomGateway:
      replicas: 0
