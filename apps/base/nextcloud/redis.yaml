apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: redis
  namespace: flux-system
spec:
  interval: 24h
  url: oci://registry-1.docker.io/bitnamicharts/redis
  layerSelector:
    mediaType: "application/vnd.cncf.helm.chart.content.v1.tar+gzip"
    operation: copy
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: nextcloud
spec:
  interval: 12h
  install:
    strategy:
      name: RetryOnFailure
  upgrade:
    strategy:
      name: RetryOnFailure
  chartRef:
    kind: OCIRepository
    name: redis
    namespace: flux-system
  values:
    # Reference: https://github.com/bitnami/charts/blob/main/bitnami/redis/README.md
    architecture: standalone
    auth:
      existingSecret: "redis"
      existingSecretPasswordKey: "redis-password"
    master:
      persistance:
        enabled: false
      nodeSelector:
        # In case of an outtage of this node, change it to the secondary node name
        kubernetes.io/hostname: "dean-homelab"
      resources:
        requests:
          cpu: 1
          memory: 128Mi
        limits:
          cpu: 2
          memory: 1024Mi
